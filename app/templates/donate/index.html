{% extends "base.html" %}

{% block title %}捐香油錢 - 線上算命系統{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <h1 class="h3 fw-bold">🕯️ 捐香油錢</h1>
                    <p class="text-muted">支持系統營運，為自己與家人祈福。</p>
                </div>
                
                <form method="post">
                    <div class="mb-4">
                        <label class="form-label fw-bold">選擇金額 (NTD)</label>
                        <div class="row g-2">
                            <div class="col-4">
                                <input type="radio" class="btn-check" name="amount" id="amt50" value="50" checked>
                                <label class="btn btn-outline-primary w-100" for="amt50">$50</label>
                            </div>
                            <div class="col-4">
                                <input type="radio" class="btn-check" name="amount" id="amt100" value="100">
                                <label class="btn btn-outline-primary w-100" for="amt100">$100</label>
                            </div>
                            <div class="col-4">
                                <input type="radio" class="btn-check" name="amount" id="amt500" value="500">
                                <label class="btn btn-outline-primary w-100" for="amt500">$500</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="message" class="form-label fw-bold">祈福留言</label>
                        <textarea class="form-control" id="message" name="message" rows="3" placeholder="例如：祈求家人身體健康、事事順心..."></textarea>
                    </div>

                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="is_anonymous" name="is_anonymous">
                        <label class="form-check-label" for="is_anonymous">匿名捐獻 (不顯示在功德榜)</label>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning btn-lg fw-bold">確認捐獻</button>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <a href="{{ url_for('main.ranking') }}" class="btn btn-link text-muted">查看目前的功德榜排名</a>
        </div>
    </div>
</div>
{% endblock %}
