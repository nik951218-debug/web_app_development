{% extends "base.html" %}

{% block title %}登入 - 線上算命系統{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <h1 class="h3 fw-bold">歡迎回來</h1>
                    <p class="text-muted">請登入您的帳號以保存算命紀錄</p>
                </div>
                <form method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">帳號</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">密碼</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">登入</button>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <p class="mb-0 text-muted">還沒有帳號？ <a href="{{ url_for('auth.register') }}" class="text-decoration-none">立即註冊</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
